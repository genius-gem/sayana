{% extends "admin/base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block page_title %}
Reset Password
{% endblock %}

{% block content %}

<!-- ====================================================== -->
<!-- PAGE HEADER -->
<!-- ====================================================== -->

<div class="page-header">

    <div>

        <h2>Reset User Password</h2>

        <p>

            Change the password for this user.

        </p>

    </div>

    <a
        href="{{ url_for('admin.users') }}"
        class="btn btn-outline"
    >

        <i class="fas fa-arrow-left"></i>

        Back to Users

    </a>

</div>


<!-- ====================================================== -->
<!-- USER INFORMATION -->
<!-- ====================================================== -->

<div class="card">

    <div class="grid grid-2">

        <div class="input-group">

            <label>

                Full Name

            </label>

            <input
                type="text"
                value="{{ user.full_name }}"
                readonly
            >

        </div>

        <div class="input-group">

            <label>

                Email Address

            </label>

            <input
                type="text"
                value="{{ user.email }}"
                readonly
            >

        </div>

    </div>

</div>


<!-- ====================================================== -->
<!-- RESET PASSWORD FORM -->
<!-- ====================================================== -->

<div class="card">

    <form
        method="POST"
        action="{{ url_for('admin.update_password', user_id=user.id) }}"
    >

        <div class="grid grid-2">

            <!-- New Password -->

            <div class="input-group">

                <label>

                    New Password

                </label>

                <input
                    type="password"
                    name="password"
                    minlength="8"
                    required
                >

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label>

                    Confirm Password

                </label>

                <input
                    type="password"
                    name="confirm_password"
                    minlength="8"
                    required
                >

            </div>

        </div>

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary"
            >

                <i class="fas fa-key"></i>

                Reset Password

            </button>

            <a
                href="{{ url_for('admin.users') }}"
                class="btn btn-outline"
            >

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
